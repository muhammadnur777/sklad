server {
    listen 80;
    server_name _;  # сюда потом вставишь домен или IP

    # Статические файлы
    location /static/ {
        alias /home/sklad/sklad/staticfiles/;
        expires 30d;
    }

    # Медиа файлы
    location /media/ {
        alias /home/sklad/sklad/media/;
        expires 30d;
    }

    # Всё остальное → gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
