<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOZOR — Kirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #28a745;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 50px 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 {
            color: #28a745;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .login-box input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box input[type="password"]:focus {
            border-color: #28a745;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .login-box button:hover {
            background: #218838;
        }
        .error {
            color: #e94560;
            font-size: 14px;
            margin-top: 12px;
        }
        .switch-link {
            margin-top: 20px;
            display: block;
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        .switch-link:hover { color: #333; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>BOZOR</h1>
        <p>Bozorga kirish uchun parolni kiriting</p>
        <form method="post">
            {% csrf_token %}
            <input type="password" name="password" placeholder="• • • •" autofocus>
            <button type="submit">Kirish</button>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
        </form>
        
    </div>
</body>
</html>
