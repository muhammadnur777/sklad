{% extends 'base.html' %}

{% block extra_css %}
<style>
    .dash-login {
        max-width: 380px;
        margin: 80px auto;
        background: #fff;
        border-radius: 16px;
        padding: 50px 40px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .dash-login h2 {
        color: #1a1a2e;
        font-size: 24px;
        margin-bottom: 8px;
    }
    .dash-login p {
        color: #888;
        font-size: 14px;
        margin-bottom: 24px;
    }
    .dash-login input[type="password"] {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #eee;
        border-radius: 10px;
        font-size: 18px;
        text-align: center;
        letter-spacing: 8px;
        outline: none;
    }
    .dash-login input:focus { border-color: #1a1a2e; }
    .dash-login button {
        width: 100%;
        padding: 14px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 16px;
    }
    .dash-login button:hover { background: #16213e; }
    .error { color: #e94560; font-size: 14px; margin-top: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="dash-login">
    <h2>Dashboard</h2>
    <p>Kirish uchun parolni kiriting</p>
    <form method="post">
        {% csrf_token %}
        <input type="password" name="dash_password" placeholder="• • • •" autofocus>
        <button type="submit">Kirish</button>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </form>
</div>
{% endblock %}
