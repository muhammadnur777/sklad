<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKLAD — {{ shop.name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .navbar {
            background: #28a745;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            color: #fff;
            font-size: 24px;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        .navbar a:hover { opacity: 0.8; }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .badge-notif {
            background: #e94560;
            color: #fff;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 11px;
            margin-left: 4px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <h1>{{ shop.name }}</h1>
        <div>
            <a href="/bozor/{{ shop.id }}/">Tovarlar</a>
            <a href="/bozor/{{ shop.id }}/tovar-qoshish/">+ Qo'shish</a>
            <a href="/bozor/{{ shop.id }}/sotuvlar/">Sotuvlar</a>
            <a href="/bozor/{{ shop.id }}/qarzdorlar/">Qarzdorlar</a>
            <a href="/bozor/{{ shop.id }}/xabar/">Xabarlar <span id="bozorNotif" class="badge-notif" style="display:none;"></span></a>
            <a href="{% url 'logout' %}">Chiqish</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}

    <script>
    function checkMessages() {
        fetch('/api/xabar-count/?direction=to_bozor')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var badge = document.getElementById('bozorNotif');
                if (data.count > 0) {
                    badge.textContent = data.count;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            });
    }
    checkMessages();
    setInterval(checkMessages, 19000);
    </script>
</body>
</html>
