{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; text-align: center;">
    <h2 style="margin-bottom: 20px; color: #eee;">Foydalanuvchilar bo'limi</h2>
    <p style="color: #999; margin-bottom: 30px;">Kirish uchun maxfiy parolni kiriting</p>
    
    <form method="post">
        {% csrf_token %}
        <input type="password" name="password" placeholder="Maxfiy parol"
            style="width: 100%; padding: 12px 16px; font-size: 18px; text-align: center;
            letter-spacing: 6px; border: 2px solid #444; border-radius: 8px;
            background: #2a2a3e; color: #fff; outline: none; margin-bottom: 16px;">
        
        {% if error %}
            <p style="color: #e94560; margin-bottom: 16px;">{{ error }}</p>
        {% endif %}
        
        <button type="submit" 
            style="width: 100%; padding: 12px; background: #e94560; color: #fff;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer;">
            Kirish
        </button>
    </form>
</div>
{% endblock %}
